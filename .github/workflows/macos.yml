name: macOS

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify ImageIO destination compatibility
        run: swift test --filter ImageIODestinationCompatibilityTests

      - name: Run test suite
        run: swift test
