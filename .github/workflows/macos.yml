name: macOS 14 Apple Silicon release gate

on:
  workflow_dispatch:

jobs:
  macos-14-release-gate:
    # This intentionally requires an organization-provided Apple Silicon host.
    # GitHub's generic macos-14 label may select Intel and is not release evidence.
    runs-on: [self-hosted, macOS, ARM64, macos-14]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify ImageIO destination compatibility
        run: swift test --filter ImageIODestinationCompatibilityTests

      - name: Run test suite
        run: swift test --parallel

      - name: Verify release artifact
        run: ./Scripts/build-app.sh release
